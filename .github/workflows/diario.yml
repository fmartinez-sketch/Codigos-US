name: Busqueda Diaria Google Maps

on:
  schedule:
    - cron: '0 12 * * *'  # Se ejecuta todos los días a las 12:00 UTC
  workflow_dispatch:      # Permite ejecutarlo manualmente si quieres

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerias
        run: pip install -r requirements.txt

      - name: Ejecutar script
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: python script.py

      - name: Guardar cambios en GitHub
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add progreso.txt reporte_acumulado.csv
          git commit -m "Actualización diaria: $(date)" || echo "No hay cambios"
          git push
